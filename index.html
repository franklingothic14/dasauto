<!DOCTYPE html>
<html lang="de" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DER DIE DAS Trainer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --text-xs: clamp(0.68rem, 0.64rem + 0.2vw, 0.78rem);
            --text-sm: clamp(0.80rem, 0.76rem + 0.22vw, 0.90rem);
            --text-base: clamp(0.90rem, 0.86rem + 0.22vw, 1.00rem);
            --text-lg: clamp(1.05rem, 0.95rem + 0.55vw, 1.32rem);
            --text-2xl: clamp(1.8rem, 1.2rem + 2vw, 3rem);
            --radius-lg: 1.4rem;
            --radius-xl: 1.8rem;
            --radius-full: 9999px;
            --bg: #e8e8ec;
            --surface: #e8e8ec;
            --text-color: #2a2a35;
            --text-soft: #7a7a8a;
            --text-faint: #b0b0bc;
            --sh-dark: rgba(180, 180, 195, 0.85);
            --sh-light: rgba(255, 255, 255, 0.92);
            --neo-raise: 6px 6px 14px var(--sh-dark), -6px -6px 14px var(--sh-light);
            --neo-raise-lg: 10px 10px 26px var(--sh-dark), -10px -10px 26px var(--sh-light);
            --neo-inset: inset 4px 4px 10px var(--sh-dark), inset -4px -4px 10px var(--sh-light);
            --der: #1a7fd4;
            --die: #F2668B;
            --das: #03A688;
            --success: #5aaa78;
            --success-bg: rgba(90, 170, 120, 0.13);
            --danger: #d07070;
            --danger-bg: rgba(208, 112, 112, 0.13);
            --font-body: 'Plus Jakarta Sans', system-ui, sans-serif;
        }

        [data-theme="dark"] {
            --bg: #1e1e24;
            --surface: #1e1e24;
            --text-color: #e8e4de;
            --text-soft: #9090a0;
            --text-faint: #55555f;
            --sh-dark: rgba(0, 0, 0, 0.60);
            --sh-light: rgba(255, 255, 255, 0.048);
            --neo-raise: 6px 6px 14px var(--sh-dark), -6px -6px 14px var(--sh-light);
            --neo-raise-lg: 10px 10px 26px var(--sh-dark), -10px -10px 26px var(--sh-light);
            --neo-inset: inset 4px 4px 10px rgba(0, 0, 0, 0.55), inset -4px -4px 10px rgba(255, 255, 255, 0.035);
            --der: #2e9ae0;
            --success: #6aaa7e;
            --success-bg: rgba(106, 170, 126, 0.15);
            --danger: #c97a73;
            --danger-bg: rgba(201, 122, 115, 0.15);
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            -webkit-font-smoothing: antialiased;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-body);
            font-size: var(--text-base);
            color: var(--text-color);
            background: var(--bg);
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1.6rem 1rem 3rem;
        }

        button {
            font: inherit;
            cursor: pointer;
        }

        .container {
            width: min(680px, 100%);
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        h1 {
            font-size: var(--text-lg);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin: 0;
        }

        h1 .der {
            color: var(--der);
        }

        h1 .die {
            color: var(--die);
        }

        h1 .das {
            color: var(--das);
        }

        .top-right {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .segment-switch {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem;
            background: var(--surface);
            border-radius: var(--radius-full);
            box-shadow: var(--neo-inset);
        }

        .segment-btn {
            height: 38px;
            padding: 0 0.9rem;
            border: none;
            border-radius: var(--radius-full);
            background: transparent;
            color: var(--text-faint);
            font-family: var(--font-body);
            font-size: var(--text-xs);
            font-weight: 800;
            letter-spacing: 0.04em;
            transition: all 160ms ease;
            white-space: nowrap;
        }

        .segment-btn.active {
            background: var(--surface);
            color: var(--text-color);
            box-shadow: var(--neo-raise);
        }

        .segment-btn:hover:not(.active) {
            color: var(--text-soft);
        }

        .icon-pill {
            width: 46px;
            height: 46px;
            border-radius: var(--radius-full);
            border: none;
            background: var(--surface);
            color: var(--text-soft);
            box-shadow: var(--neo-raise);
            display: grid;
            place-items: center;
            font-size: 1rem;
            transition: transform 150ms ease, box-shadow 150ms ease, opacity 200ms ease;
            flex: 0 0 auto;
        }

        .icon-pill:hover {
            transform: translateY(-2px);
        }

        .icon-pill:active {
            box-shadow: var(--neo-inset) !important;
            transform: scale(0.97);
        }

        .controls-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .word-row {
            display: grid;
            grid-template-columns: 72px 1fr 72px;
            gap: 0.6rem;
            align-items: stretch;
        }

        .side-counter {
            border-radius: var(--radius-lg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.2rem;
            padding: 0.8rem 0.4rem;
            box-shadow: var(--neo-raise-lg);
            transition: background 0.3s;
        }

        .side-counter.correct-counter {
            background: var(--success-bg);
        }

        .side-counter.wrong-counter {
            background: var(--danger-bg);
        }

        .side-counter .count-num {
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        .side-counter.correct-counter .count-num {
            color: var(--success);
        }

        .side-counter.wrong-counter .count-num {
            color: var(--danger);
        }

        .side-counter .count-label {
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-faint);
        }

        /* ── Glow animations ── */
        @keyframes glow-correct {
            0% {
                box-shadow: var(--neo-raise-lg), 0 0 0px 0px rgba(90, 170, 120, 0);
            }

            20% {
                box-shadow: var(--neo-raise-lg),
                    0 6px 40px 10px rgba(80, 200, 130, 0.7),
                    0 0 70px 18px rgba(60, 180, 110, 0.35),
                    0 -4px 24px 6px rgba(120, 230, 160, 0.3);
            }

            100% {
                box-shadow: var(--neo-raise-lg), 0 0 0px 0px rgba(90, 170, 120, 0);
            }
        }

        @keyframes glow-wrong {
            0% {
                box-shadow: var(--neo-raise-lg), 0 0 0px 0px rgba(208, 112, 112, 0);
            }

            20% {
                box-shadow: var(--neo-raise-lg),
                    0 6px 40px 10px rgba(220, 90, 90, 0.7),
                    0 0 70px 18px rgba(210, 80, 80, 0.35),
                    0 -4px 24px 6px rgba(240, 120, 120, 0.3);
            }

            100% {
                box-shadow: var(--neo-raise-lg), 0 0 0px 0px rgba(208, 112, 112, 0);
            }
        }

        .side-counter.pulse-correct {
            animation: glow-correct 950ms ease-out forwards;
        }

        .side-counter.pulse-wrong {
            animation: glow-wrong 950ms ease-out forwards;
        }

        #word-display {
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--neo-raise-lg);
            padding: 2.4rem 2rem;
            text-align: center;
        }

        .noun {
            font-size: var(--text-2xl);
            font-weight: 800;
            color: var(--text-color);
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 0 0.5rem;
            letter-spacing: -0.02em;
        }

        .translation {
            font-size: var(--text-lg);
            color: var(--text-faint);
            font-weight: 500;
            margin: 0;
            min-height: 1.6em;
            transition: opacity 0.2s;
        }

        .translation.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .buttons {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .buttons button {
            flex: 1 1 120px;
            max-width: 180px;
            min-height: 64px;
            font-size: var(--text-lg);
            font-weight: 800;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: var(--radius-lg);
            background: var(--surface);
            box-shadow: var(--neo-raise);
            transition: transform 150ms ease, box-shadow 150ms ease;
        }

        .buttons button[data-article="der"] {
            color: var(--der);
        }

        .buttons button[data-article="die"] {
            color: var(--die);
        }

        .buttons button[data-article="das"] {
            color: var(--das);
        }

        .buttons button:hover {
            transform: translateY(-3px);
        }

        .buttons button:active {
            transform: scale(0.96);
            box-shadow: var(--neo-inset) !important;
        }

        .log-section {
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--neo-raise-lg);
            padding: 1.4rem;
        }

        .log-section h3 {
            font-size: var(--text-xs);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.09em;
            color: var(--text-faint);
            margin: 0 0 1rem;
        }

        .log-body {
            background: var(--surface);
            border-radius: var(--radius-lg);
            box-shadow: var(--neo-inset);
            overflow-y: auto;
            max-height: 220px;
            padding: 0.85rem 1rem;
            font-size: 0.80rem;
            line-height: 1.8;
            color: var(--text-soft);
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            margin-bottom: 1rem;
        }

        .log-line {
            margin: 0;
        }

        .log-empty {
            color: var(--text-faint);
            font-style: italic;
        }

        .clear-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 0.72rem 1.3rem;
            border: none;
            border-radius: var(--radius-full);
            font-family: var(--font-body);
            font-size: var(--text-sm);
            font-weight: 700;
            background: var(--surface);
            color: var(--danger);
            box-shadow: var(--neo-raise);
            transition: transform 150ms ease, box-shadow 150ms ease;
            min-height: 44px;
        }

        .clear-btn:hover {
            transform: translateY(-2px);
        }

        .clear-btn:active {
            transform: scale(0.97);
            box-shadow: var(--neo-inset) !important;
        }

        @media (max-width: 560px) {
            body {
                padding: 0.65rem 0.75rem 2rem;
            }

            .noun {
                font-size: clamp(1.6rem, 8vw, 2.2rem);
                min-height: 56px;
            }

            #word-display {
                padding: 1.6rem 1.2rem;
            }

            .buttons button {
                min-height: 54px;
                flex: 1 1 80px;
            }

            .segment-btn {
                height: 34px;
                padding: 0 0.6rem;
            }

            .word-row {
                grid-template-columns: 56px 1fr 56px;
                gap: 0.4rem;
            }

            .side-counter .count-num {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="topbar">
            <h1><span class="der">DER</span> <span class="die">DIE</span> <span class="das">DAS</span> TRAINER</h1>
            <div class="top-right">
                <div class="segment-switch" id="langSwitch">
                    <button class="segment-btn active" data-lang="en">EN</button>
                    <button class="segment-btn" data-lang="uk">UKR</button>
                    <button class="segment-btn" data-lang="hu">HU</button>
                </div>
                <button class="icon-pill" id="themeToggle" aria-label="Thema wechseln">◐</button>
            </div>
        </div>

        <div class="controls-bar">
            <div class="segment-switch" id="levelSwitch">
                <button class="segment-btn" data-level="A1">A1</button>
                <button class="segment-btn" data-level="A2">A2</button>
                <button class="segment-btn" data-level="B1">B1</button>
                <button class="segment-btn active" data-level="all">Alle</button>
            </div>
            <button class="icon-pill" id="translationToggle" title="Übersetzung ein/aus">👁</button>
        </div>

        <div class="word-row">
            <div class="side-counter correct-counter" id="correctCounter">
                <span class="count-num" id="correctNum">0</span>
                <span class="count-label">Richtig</span>
            </div>
            <div id="word-display">
                <div class="noun" id="noun">Laden...</div>
                <div class="translation" id="translation"></div>
            </div>
            <div class="side-counter wrong-counter" id="wrongCounter">
                <span class="count-num" id="wrongNum">0</span>
                <span class="count-label">Falsch</span>
            </div>
        </div>

        <div class="buttons">
            <button data-article="der">der</button>
            <button data-article="die">die</button>
            <button data-article="das">das</button>
        </div>

        <div class="log-section">
            <h3>Verlauf</h3>
            <div class="log-body" id="logBody">
                <span class="log-empty">Noch keine Antworten.</span>
            </div>
            <button class="clear-btn" id="clearBtn">Verlauf leeren</button>
        </div>

    </div>
    <script src="./words.js"></script>
    <script>
        // ── Theme ──────────────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');
        let currentTheme = localStorage.getItem('ddd-theme') || 'light';
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            themeToggle.textContent = t === 'light' ? '◑' : '◐';
        }
        themeToggle.addEventListener('click', () => {
            currentTheme = currentTheme === 'light' ? 'dark' : 'light';
            applyTheme(currentTheme);
            localStorage.setItem('ddd-theme', currentTheme);
        });
        applyTheme(currentTheme);

        // ── Translation toggle ─────────────────────────────────
        const translationToggle = document.getElementById('translationToggle');
        const translationEl = document.getElementById('translation');
        let showTranslation = localStorage.getItem('ddd-transl') !== 'false';
        function applyTranslation() {
            translationEl.classList.toggle('hidden', !showTranslation);
            translationToggle.style.opacity = showTranslation ? '1' : '0.35';
            localStorage.setItem('ddd-transl', showTranslation);
        }
        translationToggle.addEventListener('click', () => {
            showTranslation = !showTranslation;
            applyTranslation();
        });

        // ── Load check ─────────────────────────────────────────
        window.addEventListener('load', () => {
            if (typeof window.WORDS === 'undefined') {
                document.getElementById('noun').textContent = '⚠ words.js nicht gefunden!';
                return;
            }
            init();
        });

        // ── Lang ───────────────────────────────────────────────
        let currentLang = localStorage.getItem('ddd-lang') || 'en';
        function applyLang(lang) {
            currentLang = lang;
            localStorage.setItem('ddd-lang', lang);
            document.querySelectorAll('#langSwitch .segment-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.lang === lang));
            if (current) renderTranslation();
            renderLog();
        }
        document.getElementById('langSwitch').addEventListener('click', e => {
            const b = e.target.closest('.segment-btn');
            if (b) applyLang(b.dataset.lang);
        });

        // ── Level ──────────────────────────────────────────────
        let currentLevel = localStorage.getItem('ddd-level') || 'all';
        function getPool() {
            if (!Array.isArray(window.WORDS)) return [];
            if (currentLevel === 'all') return window.WORDS;
            return window.WORDS.filter(w => w.level === currentLevel);
        }
        function applyLevel(level) {
            currentLevel = level;
            localStorage.setItem('ddd-level', level);
            document.querySelectorAll('#levelSwitch .segment-btn').forEach(b =>
                b.classList.toggle('active', b.dataset.level === level));
            pickRandomWord();
        }
        document.getElementById('levelSwitch').addEventListener('click', e => {
            const b = e.target.closest('.segment-btn');
            if (b) applyLevel(b.dataset.level);
        });
        document.querySelectorAll('#levelSwitch .segment-btn').forEach(b =>
            b.classList.toggle('active', b.dataset.level === currentLevel));

        // ── Pulse helper ───────────────────────────────────────
        function triggerPulse(el, cls) {
            el.classList.remove('pulse-correct', 'pulse-wrong');
            void el.offsetWidth;
            el.classList.add(cls);
        }

        // ── Game ───────────────────────────────────────────────
        let current = null, correctCount = 0, wrongCount = 0, log = [];
        const nounEl = document.getElementById('noun');
        const correctNum = document.getElementById('correctNum');
        const wrongNum = document.getElementById('wrongNum');
        const correctCounter = document.getElementById('correctCounter');
        const wrongCounter = document.getElementById('wrongCounter');
        const logBody = document.getElementById('logBody');

        function getTranslation(w) {
            if (!w) return '';
            if (currentLang === 'uk') return w.ukrainian || w.english || '';
            if (currentLang === 'hu') return w.hungarian || w.english || '';
            return w.english || '';
        }
        function renderTranslation() {
            translationEl.textContent = getTranslation(current);
        }

        function renderLog() {
            if (!log.length) { logBody.innerHTML = '<span class="log-empty">Noch keine Antworten.</span>'; return; }
            const col = { der: 'var(--der)', die: 'var(--die)', das: 'var(--das)' };
            logBody.innerHTML = log.map(e => {
                const tr = getTranslation(e.wordObj);
                return `<div class="log-line">` +
                    `<span style="color:${e.isCorrect ? 'var(--success)' : 'var(--danger)'};font-weight:800;">${e.isCorrect ? '✓' : '✗'} </span>` +
                    `<span style="color:${col[e.correct]};font-weight:800;">${e.correct}</span> ${e.noun}` +
                    (tr ? ` <span style="color:var(--text-faint)">— ${tr}</span>` : '') +
                    (!e.isCorrect ? ` <span style="color:var(--danger);font-size:0.75em">(gewählt: ${e.chosen})</span>` : '') +
                    `</div>`;
            }).join('');
            logBody.scrollTop = logBody.scrollHeight;
        }

        function pickRandomWord() {
            const pool = getPool();
            if (!pool.length) {
                nounEl.textContent = 'Keine Wörter für dieses Niveau';
                translationEl.textContent = '';
                current = null;
                return;
            }
            current = pool[Math.floor(Math.random() * pool.length)];
            nounEl.textContent = current.noun;
            renderTranslation();
        }

        function handleAnswer(chosen) {
            if (!current) return;
            const isCorrect = chosen === current.article;
            if (isCorrect) {
                correctCount++;
                correctNum.textContent = correctCount;
                triggerPulse(correctCounter, 'pulse-correct');
            } else {
                wrongCount++;
                wrongNum.textContent = wrongCount;
                triggerPulse(wrongCounter, 'pulse-wrong');
            }
            log.push({ noun: current.noun, correct: current.article, chosen, isCorrect, wordObj: { ...current } });
            renderLog();
            setTimeout(pickRandomWord, isCorrect ? 600 : 1200);
        }

        document.getElementById('clearBtn').addEventListener('click', () => {
            log = []; correctCount = 0; wrongCount = 0;
            correctNum.textContent = '0';
            wrongNum.textContent = '0';
            renderLog();
        });

        document.querySelectorAll('.buttons button').forEach(btn =>
            btn.addEventListener('click', () => handleAnswer(btn.getAttribute('data-article'))));

        function init() {
            applyLang(currentLang);
            applyTranslation();
            pickRandomWord();
        }
    </script>
</body>

</html>
